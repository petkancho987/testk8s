name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }} .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }}

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }}|g" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add k8s/deployment.yaml

          git commit -m "Update image tag to ${{ steps.meta.outputs.TAG }}" || echo "No changes"

          git push
